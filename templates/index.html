<!DOCTYPE html>
<html>
<head>
    <title>AI Document Analyzer</title>
</head>
<body>
    <h1>AI Document Analyzer</h1>

    <form method="post">
        <textarea name="text" rows="10" cols="50"></textarea><br>
        <button type="submit">Analyze</button>
    </form>

    {% if result %}
        <h2>Summary</h2>
        <p>{{ result.summary }}</p>

        <h2>Key Points</h2>
        <ul>
        {% for p in result.key_points %}
            <li>{{ p }}</li>
        {% endfor %}
        </ul>

        <h2>Questions</h2>
        <ul>
        {% for q in result.questions %}
            <li>{{ q }}</li>
        {% endfor %}
        </ul>
    {% endif %}
</body>
</html>
